name: Daily Paper Digest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run daily paper digest
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
        run: |
          uv run src/zotero_arxiv_daily/main.py

      - name: Commit generated reports
        run: |
          git config user.name "${{ vars.NAME || 'github-actions[bot]' }}"
          git config user.email "${{ vars.EMAIL || '41898282+github-actions[bot]@users.noreply.github.com' }}"
          git add reports data
          git diff --cached --quiet || git commit -m "Add daily paper report - $(date +%Y-%m-%d)"
          git push
