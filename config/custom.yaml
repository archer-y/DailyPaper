zotero:
  enabled: false  # Disable Zotero for keyword-only mode
  user_id: null  # Set via ZOTERO_ID environment variable
  api_key: null  # Set via ZOTERO_KEY environment variable
  include_path: ["000-正在阅读/**"]

email:
  enabled: false
  sender: ${oc.env:SENDER,null}
  receiver: ${oc.env:RECEIVER,null}
  smtp_server: ${oc.env:SMTP_SERVER,smtp.qq.com}
  smtp_port: ${oc.env:SMTP_PORT,465}
  sender_password: ${oc.env:SENDER_PASSWORD,null}

llm:
  api:
    key: null  # Set via OPENAI_API_KEY environment variable
    base_url: null  # Set via OPENAI_BASE_URL environment variable
  generation_kwargs:
    model: glm-5
  language: Chinese

source:
  arxiv:
    category: ["cs.AI","cs.LG","cs.RO","cs.SY","cs.MA","eess.SY"]
    include_cross_list: true
    date_range: "1day"
  openalex:
    enabled: false
    keywords: ["agent","scheduling","satellite","optimization","autonomous","planning"]
    date_range: "1month"
    max_results: 100

executor:
  debug: true
  send_empty: true
  max_paper_num: 10
  source: ['arxiv']
  keywords: ["Agent","multi-agent","autonomous agent","tool-use","planning","scheduling","optimization","spacecraft","satellite","mission planning","orbital","observation","Earth observation","positioning","RAG"]
  keyword_score_weight: 0.5
  filter_mode: "serial"  # Use serial mode for keyword-only filtering
  similarity_threshold: 0.0  # Lower threshold for keyword-only mode
  candidate_pool_size: 50

reporting:
  enabled: true

notifications:
  enabled: true